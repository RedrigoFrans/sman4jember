# ==============================================================
# DevoraV2 - Docker Compose (Development & Staging)
# ==============================================================

networks:
  devora-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  storage-data:
    driver: local

services:
  # ----------------------------------------------------------
  # Laravel App (PHP-FPM + Nginx via Supervisor)
  # ----------------------------------------------------------
  app:
    image: devora-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: devora_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-devora_db}
      - DB_USERNAME=${DB_USERNAME:-devora_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-DevoraV2}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FONNTE_TOKEN=${FONNTE_TOKEN}
      - FONNTE_URL=${FONNTE_URL:-https://api.fonnte.com/send}
    volumes:
      - storage-data:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devora-network

  # ----------------------------------------------------------
  # MySQL 8 Database
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: devora_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-devora_db}
      MYSQL_USER: ${DB_USERNAME:-devora_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret_root}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"  # expose ke host di port 3307 (hindari konflik)
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      timeout: 10s
      retries: 10
      interval: 5s
      start_period: 30s
    networks:
      - devora-network

  # ----------------------------------------------------------
  # Redis (Cache + Queue + Session)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: devora_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"  # expose ke host di port 6380
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - devora-network

  # ----------------------------------------------------------
  # Queue Worker
  # ----------------------------------------------------------
  queue:
    image: devora-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: devora_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-time=3600
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-devora_db}
      - DB_USERNAME=${DB_USERNAME:-devora_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - storage-data:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devora-network

  # ----------------------------------------------------------
  # Scheduler (Laravel Cron)
  # ----------------------------------------------------------
  scheduler:
    image: devora-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: devora_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-devora_db}
      - DB_USERNAME=${DB_USERNAME:-devora_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
    volumes:
      - storage-data:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devora-network
