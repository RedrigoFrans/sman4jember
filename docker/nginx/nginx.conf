user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 64M;  # Untuk upload Excel dan file besar

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    server {
        listen 80;
        server_name _;  # terima semua hostname / IP

        root /var/www/html/public;
        index index.php;

        charset utf-8;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Handle Inertia.js SPA routing + Laravel routes
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Alias for legacy covers path pointing to persistent storage
        location ^~ /covers/ {
            alias /var/www/html/storage/app/public/covers/;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static assets cache (Vite-built files dengan hash)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;

            # Timeout untuk proses lama (import Excel, generate PDF)
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
        }

        # Deny access to hidden files
        location ~ /\.(?!well-known).* {
            deny all;
        }

        # Deny access to sensitive folders
        location ~* /(database|bootstrap/cache|vendor)/ {
            deny all;
        }
    }
}
